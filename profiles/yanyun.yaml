filterable_categories:
  - "通用物品"
  - "通用NPC"

extraction_notes:
  - "中文人名模式强制提取：老X、小X、阿X、X嫂、X婶、X伯、X叔、X爷、X娘、X姑、X儿、X子、X头、X哥、X弟、X师傅、X长老——一个不漏"
  - "常规通称不提取：先生、大侠、少侠、公子、姑娘、弟子、同门、师姐、师妹、师叔、师伯、掌门——除非是专有名字的一部分"
  - "通用场所不提取：书房、医馆、夜市、大殿、山寨、谷仓、渡口等无专有名称的场所"
  - "通用原材料不提取：柴火、木炭、石灰、石炭、绳子、铁链、芸香等日常材料"
  - "节气/泛时间词不提取：春分、秋分、子时等"

extract_examples:
  include:
    - "武学招式（如：积矩九剑、无名剑法、千机索天·绝、祀血问诛）"
    - "墨家机关术相关（如：神臂弩、机关人、木鸢、木牛、分水机关、凌云轨、云槎）"
    - "NPC全名（如：张友友、鹫长老、老徐、白娘娘、晋公子、东阙公子、青长老、万大海、伊刀、容将军、寒姨、赵普、孙平、丁不董）"
    - "重要地点建筑（如：千年渡、桃源、未央城、封龙山、嗟叹崖、神仙渡、不羡仙）"
    - "门派势力（如：墨门、墨城、金刀镖局、天工阁、绣金楼）"
    - "古籍文献（如：墨经、连山诀）"
    - "核心道具圣物（如：浮云匙、墨筹、沦波舟、唤魂帆）"
    - "战斗BUFF状态（如：溃势、定身、震慑、真气护盾）"
    - "核心货币资源（如：宝钱、乌金、萤石）"
    - "角色属性（如：气量、雅致、眼力、思辨）"
    - "战斗系统术语（如：破防、承伤、受击、眩晕、听风辩位）"
    - "UI系统交互（如：联机、匹配、组队、绑定、令牌）"
    - "门派系统（如：外门弟子、内门弟子、弟子令、门规）"
    - "玩法机制（如：大衍迷阵、水转百戏、白日参辰）"
    - "路人NPC称呼（如：王婶、蔡婶、老农、春花婶、蔺大婶、老舵工、皮老大、皮老二、戈老大）"
    - "普通物品材料（如：五加汤、饸络面、五色糕、榆钱饭、羊羹、伏火硫磺、北亭砂）"
    - "动物名角色（如：青、燕、隼、鸽、鹤、鵙、鸦、鹏、鹞、鹭、鹳、鸰儿、鹈鹕——作角色名时）"
    - "江湖排行式命名（如：戈老大、戈老二、戈老三、皮老大、皮老二、钱二娘、刘三妹——数字编号的角色名一律提取）"
    - "NPC称谓后缀（如：X嫂、X婶、X爷、X伯、X叔、X姑、X娘、X儿、X头、X工、X生、X师傅、X匠人——带后缀的都是具名NPC，一个不漏）"
  exclude:
    - "通用日常物品（如：木炭、草鞋、火把、柴火、绳子、铁链、箱子）"
    - "通用称谓/泛称（如：大侠、少侠、公子、弟子、游侠、先生、掌门、长老——非专有名字的一部分时）"
    - "成语/固定短语（如：一飞冲天、大鹏展翅）"
    - "时间词（如：子时、昨夜）"

fewshot_examples:
  - input: "青长老说墨门弟子需恪守门规"
