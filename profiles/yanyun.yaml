translation_rules:
  - "角色名/NPC名 → 音译（拼音）"
  - "技能/招式/武学名 → 意译，传达含义"
  - "地点/建筑名 → 意译为主，必要时音译+意译结合"
  - "物品/道具名 → 简洁意译"
  - "古籍/文献名 → 意译为主"
  - "怪物/BOSS名 → 意译，传达特征"
  - "头衔称谓 → 意译（如公子→Master, 长老→Elder）"
  - "每个术语一行，格式：中文术语 → 英文译文"
