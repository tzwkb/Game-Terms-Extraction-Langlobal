game_type: "古风武侠开放世界（燕云十六州）"
task_description: "燕云十六州游戏术语抽取任务"

core_principle: |
  文本中出现的中文人名——无论主线 NPC、路人、单次提及——一律提取：
  - 2-4字姓名（丁不董、万大海、丘永）
  - 称谓组合（老徐、小蝶、阿青、云香嫂、赵大爷、翠儿）
  - 排行命名（戈老大、钱二娘、刘三妹）
  - 单字名（燕、隼、青、鵙——作角色名时）

  人物重要性、出场次数、是否主线——都不影响。出现即术语。

