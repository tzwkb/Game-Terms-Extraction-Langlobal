game_type: "中式微恐搜打撤+拍卖游戏（咻咻勇者）"
task_description: "咻咻勇者游戏术语抽取任务——抽取游戏内所有专有名词供翻译团队使用"

core_principle: |
  抽取游戏内所有专有名词。出现即术语，不论主次、出场次数。

  必须提取：
  - 人名/角色名（含敌对单位、随从，凡是名称都归人物名）
  - 技能名、技能描述中的特效名（火球、闪电等）
  - UI 按钮/系统文字、地点名、物品名、活动名
  - 战斗术语（生命值、伤害等）、状态名、战斗机制（重生、死亡）、玩法机制（合成、装备）
  - 货币、剧情时间/世界观名词
  - 数词（表达 BUFF 层数的"层"等量词）
  - 上下文多次出现、需要统一的常见名词

  前缀/后缀拆分：复合专有名词在提取完整词的同时，拆分提取其前缀与后缀。
  例：分魂轮回礼包 → 提取「分魂轮回礼包」+「分魂轮回」+「礼包」。

  带数字的礼包不提取数字：分魂轮回礼包1、分魂轮回礼包2 一律归为「分魂轮回礼包」，不提取编号。

  泛称 vs 具名称号都要提取：泛指的「老师」与带姓的「王老师」两者都单独提取。
  推断式简称需备注：可由上下文推断指代的人物简称（如「姗姗」是「李琳姗」小名），
  在 context 写明推断结果并标注「需人工核查」。需要人工区分的一律标「需人工核查」。

  美术字文件中的术语全部归入「美术字」分类。

  不提取：仅出现一次的日常通用物品。

