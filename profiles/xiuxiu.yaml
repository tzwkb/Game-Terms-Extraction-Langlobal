    min_len: 2
    max_len: 3

address_suffixes: []

filterable_categories:
  - "通用物品"

extraction_notes:
  - "复合专有名词拆分：提取完整词的同时拆出前缀和后缀。例：分魂轮回礼包 → 分魂轮回礼包 + 分魂轮回 + 礼包"
  - "带数字的礼包归并：分魂轮回礼包1、分魂轮回礼包2 一律归为「分魂轮回礼包」，不提取数字编号"
  - "泛称与具名称号并存：泛指的「老师」与带姓的「王老师」两者都要单独提取，泛指项在 context 标注「泛指用」，称号项标注「称呼，指X老师」"
  - "推断式简称：可由上下文推断指代的简称（如姗姗=李琳姗小名）要提取，并在 context 写明推断结果+「需人工核查」"
  - "数词/量词：表达 BUFF 层数的「层」等需要统一的量词要提取，归「数词」"
  - "美术字文件里的术语全部归「美术字」分类"
  - "需要人工确认或区分的术语，一律在 context 标注「需人工核查」"
  - "仅出现一次的日常通用物品不提取"

extract_examples:
  include:
    - "人物名，含敌对单位/随从/NPC，凡名称皆提取（如：李琳姗、姗姗、王老师）"
    - "NPC称号、玩家称号（如：泛指与具名的「老师」）"
    - "技能名及技能描述中的特效名（如：火球、闪电）"
    - "状态名、战斗机制（如：重生、死亡）"
    - "玩法机制（如：合成、装备）"
    - "战斗术语（如：生命值、伤害）"
    - "地点名"
    - "UI 按钮/系统文字"
    - "物品名、货币"
    - "活动名、礼包名（含前后缀拆分，如：分魂轮回礼包、分魂轮回、礼包）"
    - "剧情时间、世界观名词"
    - "数词/层数量词（如：层）"
    - "上下文多次出现、需统一的常见名词"
    - "美术字文件中的所有术语（归「美术字」）"
  exclude:
    - "仅出现一次的日常通用物品"

fewshot_examples:
  - input: "购买分魂轮回礼包1可获得大量奖励"
    output:
      - term: "分魂轮回礼包"
        category: "物品名"
      - term: "分魂轮回"
        category: "剧情术语"
      - term: "礼包"
        category: "物品名"
  - input: "王老师走了过来，老师说今天的课取消了"
    output:
      - term: "王老师"
        category: "人物名"
        context: "称呼，指王老师，需人工核查"
      - term: "老师"
        category: "NPC称号"
        context: "泛指用"
  - input: "姗姗推开门走了进来"
    output:
      - term: "姗姗"
        category: "人物名"
        context: "李琳姗小名，需人工核查"
  - input: "释放技能后附带火球与闪电特效"
    output:
      - term: "火球"
        category: "特效名"
      - term: "闪电"
        category: "特效名"
  - input: "受到伤害后生命值下降，叠加3层灼烧"
    output:
      - term: "伤害"
        category: "战斗机制"
      - term: "生命值"
        category: "战斗机制"
      - term: "灼烧"
        category: "状态名"
      - term: "层"
        category: "数词"
  - input: "角色死亡后可在复活点重生"
    output:
      - term: "死亡"
        category: "战斗机制"
      - term: "重生"
        category: "战斗机制"
  - input: "在工作台合成装备"
    output:
      - term: "合成"
        category: "玩法机制"
      - term: "装备"
        category: "玩法机制"
  - input: "召唤10道闪电随机轰击周围区域，每次造成150%攻击的法术伤害，并附加1层【雷印】"
    output:
      - term: "闪电"
        category: "特效名"
      - term: "法术伤害"
        category: "战斗机制"
      - term: "攻击"
        category: "战斗机制"
      - term: "层"
        category: "数词"
        context: "指战斗中的状态层数"
      - term: "雷印"
        category: "状态名"
      - term: "轰击"
        category: "多次重复需统一"
  - input: "一栋五层的复古家居专门店。第五层只对部分vip客人开放。"
    output: []

term_categories:
  - "人物名"
  - "NPC称号"
  - "玩家称号"
  - "地点"
  - "UI"
  - "技能名"
  - "特效名"
  - "状态名"
  - "战斗机制"
  - "玩法机制"
  - "货币"
  - "物品名"
  - "活动名"
  - "剧情术语"
  - "数词"
  - "多次重复需统一"
  - "美术字"
  - "通用物品"

translation_rules:
  - "目标语言：英文（项目表未指定，默认中→英，确认后可调整）"
  - "人物名 → 音译（拼音）"
  - "技能名/特效名 → 意译，传达含义"
  - "地点 → 意译为主，必要时音译+意译结合"
  - "物品名/货币 → 简洁意译"
  - "状态名/战斗机制/玩法机制 → 意译，沿用通行游戏术语"
  - "UI/按钮 → 意译，简洁口语化"
  - "活动名/礼包名 → 意译，传达卖点"
  - "数词/量词 → 按英文习惯处理（如「层」→ stack/layer）"
  - "其余统一意译"
  - "每个术语一行，格式：中文术语 → 英文译文"
